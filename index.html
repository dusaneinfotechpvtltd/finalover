<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FINALOVER — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --red:    #E8161A;
      --red2:   #FF3C3F;
      --dark:   #080808;
      --deep:   #050505;
      --panel:  #0E0E0E;
      --line:   #1A1A1A;
      --text:   #F0EDE8;
      --dim:    #444444;
      --white:  #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    /* ─── Canvas background (animated particles) ─── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      opacity: .35;
    }

    /* ─── Scanline overlay ─── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
    }

    /* ─── Vignette ─── */
    .vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,.8) 100%
      );
      pointer-events: none;
    }

    /* ─── Main wrapper ─── */
    .stage {
      position: relative; z-index: 10;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 0;
      overflow: hidden;
    }

    /* ─── Top bar ─── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 48px;
      border-bottom: 1px solid var(--line);
      animation: slideDown .7s ease both;
    }
    .topbar-left {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: .25em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .topbar-left span { color: var(--red); }
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1.2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 6px var(--red)} 50%{opacity:.2;box-shadow:none} }

    /* ─── Centre hero ─── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 24px;
      text-align: center;
    }

    /* Big diagonal stripe accent */
    .stripe {
      position: absolute;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--red), transparent);
      opacity: .15;
    }
    .stripe.l1 { left: 48px; }
    .stripe.l2 { left: 72px; animation-delay:.3s }
    .stripe.r1 { right: 48px; }
    .stripe.r2 { right: 72px; }

    /* Eye-line horizontal rule */
    .eyeline {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%, var(--line) 15%,
        var(--red) 50%,
        var(--line) 85%, transparent 100%
      );
      top: 50%;
      opacity: .4;
    }

    /* Pre-title label */
    .prelabel {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: .4em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp .6s .4s ease forwards;
    }

    /* ─── FINALOVER glitch text ─── */
    .brand {
      position: relative;
      font-family: 'Anton', sans-serif;
      font-size: clamp(80px, 15vw, 200px);
      line-height: .88;
      letter-spacing: -.01em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0;
      animation: fadeUp .7s .55s ease forwards;
      user-select: none;
    }

    .brand::before,
    .brand::after {
      content: 'FINALOVER';
      position: absolute;
      top: 0; left: 0; right: 0;
    }
    .brand::before {
      color: var(--red);
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
      animation: glitch1 4s infinite;
    }
    .brand::after {
      color: #00FFFF;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      animation: glitch2 4s infinite;
      opacity: .4;
    }

    @keyframes glitch1 {
      0%,94%,100% { transform: translate(0);  opacity: 0; }
      95%          { transform: translate(-4px, 1px); opacity: 1; }
      97%          { transform: translate(4px, -1px); opacity: 1; }
      99%          { transform: translate(-2px, 0);   opacity: 1; }
    }
    @keyframes glitch2 {
      0%,94%,100% { transform: translate(0);  opacity: 0; }
      95%          { transform: translate(5px, -2px); opacity: .5; }
      97%          { transform: translate(-3px, 2px); opacity: .5; }
      99%          { transform: translate(2px, -1px); opacity: .3; }
    }

    /* .com suffix */
    .brand-tld {
      font-family: 'Anton', sans-serif;
      font-size: clamp(32px, 5vw, 70px);
      color: var(--red);
      vertical-align: super;
      line-height: 1;
      -webkit-text-stroke: 1px var(--red);
      color: transparent;
    }

    /* ─── Tagline ─── */
    .tagline {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 300;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 20px;
      opacity: 0;
      animation: fadeUp .6s .75s ease forwards;
    }
    .tagline em {
      font-style: italic;
      font-weight: 700;
      color: var(--text);
      font-size: 1.1em;
    }

    /* ─── Countdown ─── */
    .countdown-wrap {
      margin-top: 52px;
      opacity: 0;
      animation: fadeUp .6s .9s ease forwards;
    }
    .countdown-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: .35em;
      color: var(--dim);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }
    .countdown {
      display: flex;
      gap: 2px;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px 12px 12px;
      position: relative;
      overflow: hidden;
    }
    .cd-block::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--red);
      transform: scaleX(0);
      transition: transform .3s;
    }
    .cd-block:hover::before { transform: scaleX(1); }
    .cd-sep {
      font-family: 'Anton', sans-serif;
      font-size: 36px;
      color: var(--line);
      line-height: 1;
      align-self: center;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .cd-num {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      line-height: 1;
      color: var(--white);
      transition: color .15s;
    }
    .cd-num.tick { color: var(--red); }
    .cd-unit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: .25em;
      color: var(--dim);
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ─── Email form ─── */
    .notify-wrap {
      margin-top: 48px;
      opacity: 0;
      animation: fadeUp .6s 1.1s ease forwards;
    }
    .notify-form {
      display: flex;
      gap: 0;
      max-width: 440px;
      margin: 0 auto;
    }
    .notify-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-right: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: .1em;
      padding: 14px 20px;
      outline: none;
      transition: border-color .2s;
    }
    .notify-input::placeholder { color: var(--dim); }
    .notify-input:focus { border-color: var(--red); }
    .notify-btn {
      background: var(--red);
      border: 1px solid var(--red);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 14px 28px;
      cursor: pointer;
      transition: background .2s, transform .15s;
      white-space: nowrap;
    }
    .notify-btn:hover { background: var(--red2); transform: translateY(-1px); }
    .notify-btn:active { transform: translateY(0); }

    .notify-success {
      display: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--red);
      text-transform: uppercase;
      margin-top: 12px;
      text-align: center;
    }

    /* ─── Bottom bar ─── */
    .bottombar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      border-top: 1px solid var(--line);
      animation: slideUp .7s ease both;
      flex-wrap: wrap; gap: 12px;
    }
    .bottombar-left {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .bottombar-left a {
      color: var(--red);
      text-decoration: none;
    }
    .social-row {
      display: flex; gap: 2px;
    }
    .social-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--dim);
      border: 1px solid var(--line);
      padding: 8px 14px;
      text-decoration: none;
      text-transform: uppercase;
      transition: color .2s, border-color .2s;
    }
    .social-btn:hover { color: var(--red); border-color: var(--red); }

    /* ─── Progress bar ─── */
    .progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--red2));
      width: 0%;
      transition: width 1s ease;
      z-index: 20;
      box-shadow: 0 0 12px var(--red);
    }

    /* ─── Keyframes ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      .topbar, .bottombar { padding: 18px 20px; }
      .stripe { display: none; }
      .cd-block { min-width: 68px; padding: 12px 8px 10px; }
      .cd-sep { font-size: 28px; }
      .bottombar { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .countdown { gap: 1px; }
      .cd-block { min-width: 58px; }
      .notify-form { flex-direction: column; }
      .notify-input { border-right: 1px solid var(--line); border-bottom: none; }
    }
  </style>
</head>
<body>

  <!-- Particle canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Bottom progress glow bar -->
  <div class="progress-bar" id="progressBar"></div>

  <div class="stage">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        finalover<span>.com</span>
      </div>
      <div class="status-pill">
        <div class="status-dot"></div>
        Launching Soon
      </div>
    </header>

    <!-- Hero -->
    <main class="hero">
      <div class="stripe l1"></div>
      <div class="stripe l2"></div>
      <div class="stripe r1"></div>
      <div class="stripe r2"></div>
      <div class="eyeline"></div>

      <p class="prelabel">// Something final is coming</p>

      <h1 class="brand">FINALOVER<span class="brand-tld">.com</span></h1>

      <p class="tagline">The <em>last</em> word. &nbsp;The <em>final</em> move.</p>

      <!-- Countdown -->
      <div class="countdown-wrap">
        <div class="countdown-label">// Countdown to launch</div>
        <div class="countdown">
          <div class="cd-block">
            <div class="cd-num" id="cd-d">00</div>
            <div class="cd-unit">Days</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-block">
            <div class="cd-num" id="cd-h">00</div>
            <div class="cd-unit">Hours</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-block">
            <div class="cd-num" id="cd-m">00</div>
            <div class="cd-unit">Min</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-block">
            <div class="cd-num" id="cd-s">00</div>
            <div class="cd-unit">Sec</div>
          </div>
        </div>
      </div>

      <!-- Notify form -->
      <div class="notify-wrap">
        <div class="notify-form" id="notifyForm">
          <input
            type="email"
            class="notify-input"
            id="emailInput"
            placeholder="your@email.com"
            autocomplete="off"
          />
          <button class="notify-btn" id="notifyBtn">Notify Me</button>
        </div>
        <p class="notify-success" id="notifySuccess">
          ◆ &nbsp;You're on the list. We'll be in touch.
        </p>
      </div>
    </main>

    <!-- Bottom bar -->
    <footer class="bottombar">
      <div class="bottombar-left">
        Enquiries: <a href="mailto:alerts@diipl.com">alerts@diipl.com</a>
        &nbsp;·&nbsp; © 2025 finalover.com
      </div>
      <div class="social-row">
        <a href="#" class="social-btn">Twitter</a>
        <a href="#" class="social-btn">Discord</a>
        <a href="mailto:alerts@diipl.com" class="social-btn">Contact</a>
      </div>
    </footer>

  </div><!-- /stage -->

  <script>
    // ── Particle canvas ───────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); init(); });
    resize();

    function init() {
      particles = Array.from({length: 60}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + .3,
        dx: (Math.random() - .5) * .3,
        dy: -(Math.random() * .5 + .2),
        alpha: Math.random() * .6 + .1,
      }));
    }
    init();

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,22,26,${p.alpha})`;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
        if (p.x < 0)  p.x = W;
        if (p.x > W)  p.x = 0;
      });
      requestAnimationFrame(draw);
    }
    draw();

    // ── Countdown clock ───────────────────────────────
    const LAUNCH = new Date('2025-09-01T00:00:00').getTime();

    function pad(n) { return String(n).padStart(2,'0'); }

    function tick() {
      const now  = Date.now();
      const diff = Math.max(0, LAUNCH - now);

      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);

      function update(id, val) {
        const el = document.getElementById(id);
        const str = pad(val);
        if (el.textContent !== str) {
          el.classList.add('tick');
          el.textContent = str;
          setTimeout(() => el.classList.remove('tick'), 150);
        }
      }

      update('cd-d', days);
      update('cd-h', hours);
      update('cd-m', mins);
      update('cd-s', secs);

      // Progress: how much of the year is done
      const yearStart = new Date('2025-01-01').getTime();
      const yearEnd   = LAUNCH;
      const pct = Math.min(100, ((now - yearStart) / (yearEnd - yearStart)) * 100);
      document.getElementById('progressBar').style.width = pct.toFixed(1) + '%';
    }

    tick();
    setInterval(tick, 1000);

    // ── Notify form ───────────────────────────────────
    document.getElementById('notifyBtn').addEventListener('click', () => {
      const email = document.getElementById('emailInput').value.trim();
      const re    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!re.test(email)) {
        document.getElementById('emailInput').style.borderColor = 'var(--red)';
        document.getElementById('emailInput').focus();
        return;
      }
      document.getElementById('notifyForm').style.display   = 'none';
      document.getElementById('notifySuccess').style.display = 'block';
      // In production wire to your API / Mailchimp / ConvertKit here
      console.log('Notify signup:', email);
    });

    document.getElementById('emailInput').addEventListener('input', () => {
      document.getElementById('emailInput').style.borderColor = '';
    });
  </script>
</body>
</html>
